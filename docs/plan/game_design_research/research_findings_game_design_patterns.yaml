open_questions:
  - question: "How should zone definitions be stored — in world.json per-location, or dynamically generated by AI per encounter?"
    context: "Research shows zones need to be contextual to the encounter, but pre-defined zones enable consistent behavior"
    type: decision_blocker
    affects: ["battle_system_redesign"]
  - question: "Should the memory/embedding system use a vector database or simpler in-memory cosine similarity?"
    context: "AI Dungeon uses full embedding infrastructure, but What If is much smaller scale"
    type: research
    affects: ["memory_system"]
  - question: "How to handle PvP fairness when AI adjudicates subjective positioning advantages?"
    context: "MUD research shows text PvP is challenging due to discrete spatial model. Sly Flourish uses random target selection for fairness."
    type: research
    affects: ["pvp_balance"]

