patterns_found:
  - category: architecture
    pattern: "Room/zone-based spatial model"
    description: "Text RPGs universally use discrete rooms/zones rather than coordinate grids. All occupants of a room share the same logical space. Movement is between zones, not within them."
    examples:
      - file: "MUD Wikipedia"
        location: "https://en.wikipedia.org/wiki/Multi-user_dungeon"
        snippet: "Due to the room-based nature, ranged combat is typically difficult to implement"
      - file: "Fate RPG Wikipedia"
        location: "https://en.wikipedia.org/wiki/Fate_(role-playing_game_system)"
        snippet: "An aspect is a free-form descriptor of something notable about either the character or the scene"
    prevalence: common

  - category: architecture
    pattern: "Intent-based action resolution"
    description: "DM/AI describes the situation, player describes intent, system adjudicates outcome. No coordinate math needed."
    examples:
      - file: "Sly Flourish Narrative Combat"
        location: "https://slyflourish.com/guide_to_narrative_combat.html"
        snippet: "The DM describes the situation, the player describes what they want to do, the DM adjudicates the result"
    prevalence: common

  - category: architecture
    pattern: "Dual memory: compression + retrieval"
    description: "Auto-summarize recent events (every N actions) + embed all memories for cosine-similarity retrieval. Allocated context budget, progressive forgetting."
    examples:
      - file: "Latitude.io Memory System"
        location: "https://latitude.io/news/how-the-new-memory-system-works"
        snippet: "Memories are AI-generated summaries of 4 past actions... Memory Bank uses embedding models to rank memories by relevance"
    prevalence: rare

  - category: architecture
    pattern: "Provider/model agnostic AI layer"
    description: "Abstract AI interface to swap providers/models without code changes. Database-driven model configuration. Evaluate qualitatively and quantitatively."
    examples:
      - file: "Latitude.io 2x Context"
        location: "https://latitude.io/news/how-we-gave-players-2x-context-on-ai-dungeon"
        snippet: "Hosted Mixtral on 3 different providers... Can switch AI providers at any time with minimal effort"
    prevalence: occasional

  - category: structure
    pattern: "Typed cover levels with destruction"
    description: "Full cover vs half cover as discrete types. Cover can be destroyed. Flanking bypasses cover. Height provides advantage."
    examples:
      - file: "XCOM Wikipedia"
        location: "https://en.wikipedia.org/wiki/XCOM:_Enemy_Unknown"
        snippet: "Full cover (block icon) vs Half cover (shield icon)... Flanking warnings... Cover destruction via explosives"
    prevalence: common

  - category: structure
    pattern: "Layered roguelike progression"
    description: "Three layers: within-run power-ups (reset on death), between-run permanent unlocks, escalating difficulty levels (20 Ascension/Heat levels)."
    examples:
      - file: "Hades Wikipedia"
        location: "https://en.wikipedia.org/wiki/Hades_(video_game)"
        snippet: "Permanent upgrades... Pact of Punishment... 20+ Heat levels of escalating difficulty"
      - file: "Slay the Spire Wikipedia"
        location: "https://en.wikipedia.org/wiki/Slay_the_Spire"
        snippet: "Up to 20 Ascension difficulty levels... each adding a cumulative negative effect"
    prevalence: common

  - category: structure
    pattern: "Enemy intent telegraphing"
    description: "Show players what enemies will do next. Reduces randomness frustration — losses feel earned rather than arbitrary."
    examples:
      - file: "Slay the Spire Wikipedia"
        location: "https://en.wikipedia.org/wiki/Slay_the_Spire"
        snippet: "Each opponent will telegraph what move they will make: if they will attack and with how much damage"
    prevalence: common

  - category: structure
    pattern: "Island-grid world with progressive charting"
    description: "World divided into grid sections containing islands. Sea chart progressively updated. Item-gated exploration. Fast travel critical to mitigate travel tedium."
    examples:
      - file: "Wind Waker Wikipedia"
        location: "https://en.wikipedia.org/wiki/The_Legend_of_Zelda:_The_Wind_Waker"
        snippet: "49 gridded sections of the Great Sea, each containing an island or island chain"
    prevalence: occasional

  - category: architecture
    pattern: "Narrative progression through death loop"
    description: "Death is canonical — characters return to hub. Each return unlocks new NPC dialog and storyline progression. Makes repeated play narrative-meaningful."
    examples:
      - file: "Hades Wikipedia"
        location: "https://en.wikipedia.org/wiki/Hades_(video_game)"
        snippet: "Between runs, Zagreus can explore the House of Hades... interact with various characters... which provide narrative elements"
    prevalence: occasional

  - category: architecture
    pattern: "Distance as core combat challenge"
    description: "Distance evaluation is one of three fundamental combat challenges (with time and anticipation). Enemy archetypes defined by their range role."
    examples:
      - file: "Fundamental Pillars of Combat"
        location: "https://www.gamedeveloper.com/design/the-fundamental-pillars-of-a-combat-system"
        snippet: "Enemy archetypes: shield/heavy/sniper/bomber — each defined by range relationship to player"
    prevalence: common

